<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Handbook Assistant</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4f7fb;
color:#111827;
}

.page{
max-width:900px;
margin:auto;
padding:40px 20px;
text-align:center;
}

.badge{
display:inline-block;
background:#dbeafe;
color:#1d4ed8;
padding:8px 14px;
border-radius:20px;
font-size:14px;
font-weight:bold;
margin-bottom:12px;
}

h1{
margin:0 0 10px 0;
font-size:36px;
}

.subtitle{
color:#4b5563;
max-width:700px;
margin:auto;
line-height:1.6;
margin-bottom:40px;
}

</style>

</head>

<body>

<div class="page">

<div class="badge">AI HR Support</div>

<h1>Employee Handbook Assistant</h1>

<p class="subtitle">
Ask questions about attendance, time off, conduct, scheduling,
uniforms, discipline, or any other handbook policy and get a fast answer.
</p>

</div>

<script type="module">

import Chatbot from "https://cdn.jsdelivr.net/npm/flowise-embed/dist/web.js";

Chatbot.init({
chatflowid: "46680cc0-effe-4e85-962f-5dcba21cbdd1",
apiHost: "https://cloud.flowiseai.com",
theme:{
chatWindow:{
welcomeMessage:"Hi there! Ask me anything about the employee handbook.",
starterPrompts:[
"What is the attendance policy?",
"How do I report being late?",
"What happens after repeated absences?"
]
}
}
});

</script>

</body>
</html>
