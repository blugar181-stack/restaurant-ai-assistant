<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Handbook Assistant</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f7fb;
      color: #111827;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .hero {
      text-align: center;
      margin-bottom: 24px;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 38px;
    }

    .subtitle {
      margin: 0 auto;
      max-width: 700px;
      color: #4b5563;
      font-size: 17px;
      line-height: 1.6;
    }

    .chat-shell {
      max-width: 720px;
      margin: 24px auto 0;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }

    .chat-shell-header {
      background: #2563eb;
      color: white;
      padding: 16px 20px;
    }

    .chat-shell-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .chat-shell-header p {
      margin: 6px 0 0;
      font-size: 13px;
      opacity: 0.95;
    }

    #flowise-chat {
      height: 620px;
      background: #f9fafb;
    }

    flowise-fullchatbot {
      display: block;
      width: 100%;
      height: 100%;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 30px;
      }

      .page {
        padding: 20px 12px 32px;
      }

      #flowise-chat {
        height: 72vh;
        min-height: 520px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="badge">AI HR Support</div>
      <h1>Employee Handbook Assistant</h1>
      <p class="subtitle">
        Ask questions about attendance, time off, conduct, scheduling, uniforms,
        discipline, or any other handbook policy and get a fast answer.
      </p>
    </section>

    <section class="chat-shell">
      <div class="chat-shell-header">
        <h2>Handbook Chat</h2>
        <p>Ask a policy question below</p>
      </div>
      <div id="flowise-chat"></div>
    </section>
  </div>

  <script type="module">
    import Chatbot from "https://cdn.jsdelivr.net/npm/flowise-embed/dist/web.js";

    Chatbot.initFull({
      chatflowid: "46680cc0-effe-4e85-962f-5dcba21cbdd1",
      apiHost: "https://cloud.flowiseai.com",
      theme: {
        chatWindow: {
          welcomeMessage: "Hi there! Ask me anything about the employee handbook.",
          backgroundColor: "#f9fafb",
          height: 620,
          fontSize: 15,
          starterPrompts: [
            "What is the attendance policy?",
            "How do I report being late?",
            "What happens after repeated absences?"
          ],
          botMessage: {
            backgroundColor: "#ffffff",
            textColor: "#111827",
            showAvatar: true
          },
          userMessage: {
            backgroundColor: "#2563eb",
            textColor: "#ffffff",
            showAvatar: false
          },
          textInput: {
            placeholder: "Type your handbook question...",
            backgroundColor: "#ffffff",
            textColor: "#111827",
            sendButtonColor: "#2563eb"
          },
          footer: {
            textColor: "#6b7280",
            company: "Employee Handbook Assistant",
            companyLink: "https://restaurant-ai-assistant-one.vercel.app/"
          }
        },
        customCSS: `
          .chatbot-container {
            width: 100% !important;
            height: 100% !important;
            max-width: 100% !important;
            border: none !important;
            border-radius: 0 !important;
            box-shadow: none !important;
          }

          .chatbot-header {
            display: none !important;
          }

          .chatbot-body {
            background: #f9fafb !important;
            padding: 16px !important;
          }

          .bot-message {
            border: 1px solid #e5e7eb !important;
            border-radius: 16px !important;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.05) !important;
          }

          .user-message {
            border-radius: 16px !important;
          }

          .chatbot-input {
            border-top: 1px solid #e5e7eb !important;
            background: #ffffff !important;
            padding: 14px !important;
          }

          .chatbot-input textarea,
          .chatbot-input input {
            border: 1px solid #d1d5db !important;
            border-radius: 14px !important;
            padding: 12px 14px !important;
          }

          .chatbot-input textarea:focus,
          .chatbot-input input:focus {
            border-color: #2563eb !important;
            outline: none !important;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12) !important;
          }
        `
      }
    });

    const mount = document.getElementById("flowise-chat");
    const chatbotElement = document.createElement("flowise-fullchatbot");
    mount.appendChild(chatbotElement);
  </script>
</body>
</html>
