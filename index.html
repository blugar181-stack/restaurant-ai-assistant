<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant AI Assistant</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
      text-align: center;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 30px;
      font-size: 18px;
    }

    #chatbot-container {
      width: 100%;
      max-width: 700px;
      height: 700px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Restaurant AI Assistant</h1>
    <p>Ask any question about the restaurant handbook.</p>

    <div id="chatbot-container"></div>
  </div>

  <script type="module">
    import Chatbot from "https://cdn.jsdelivr.net/npm/flowise-embed/dist/web.js";

    Chatbot.initFull({
      chatflowid: "b514668c-de34-4d8d-a619-daba68ecd284",
      apiHost: "https://cloud.flowiseai.com",
      target: document.getElementById("chatbot-container")
    });
  </script>
</body>
</html>
