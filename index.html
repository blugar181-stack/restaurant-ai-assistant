<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Handbook Assistant</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4f7fb;
color:#111827;
}

.page{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.hero{
text-align:center;
margin-bottom:30px;
}

.badge{
display:inline-block;
background:#dbeafe;
color:#1d4ed8;
padding:8px 14px;
border-radius:20px;
font-size:14px;
font-weight:bold;
margin-bottom:12px;
}

h1{
margin:0 0 10px 0;
font-size:36px;
}

.subtitle{
color:#4b5563;
max-width:700px;
margin:auto;
line-height:1.6;
}

.chat-shell{
margin-top:30px;
background:white;
border-radius:20px;
border:1px solid #e5e7eb;
box-shadow:0 20px 50px rgba(0,0,0,0.08);
overflow:hidden;
}

.chat-header{
background:#2563eb;
color:white;
padding:16px 20px;
font-weight:bold;
}

#chatbot{
height:600px;
}

flowise-fullchatbot{
display:block;
width:100%;
height:100%;
}
</style>

</head>

<body>

<div class="page">

<div class="hero">

<div class="badge">AI HR Support</div>

<h1>Employee Handbook Assistant</h1>

<p class="subtitle">
Ask questions about attendance, time off, conduct, scheduling,
uniforms, discipline, or any other handbook policy and get a fast answer.
</p>

</div>

<div class="chat-shell">

<div class="chat-header">
Handbook Chat
</div>

<div id="chatbot"></div>

</div>

</div>

<script type="module">

import Chatbot from "https://cdn.jsdelivr.net/npm/flowise-embed/dist/web.js";

/* ONLY ONE CHAT WIDGET */

Chatbot.initFull({
chatflowid: "46680cc0-effe-4e85-962f-5dcba21cbdd1",
apiHost: "https://cloud.flowiseai.com",
theme:{
chatWindow:{
welcomeMessage:"Hi there! Ask me anything about the employee handbook.",
backgroundColor:"#f9fafb",
height:600,
starterPrompts:[
"What is the attendance policy?",
"How do I report being late?",
"What happens after repeated absences?"
],
botMessage:{
backgroundColor:"#ffffff",
textColor:"#111827"
},
userMessage:{
backgroundColor:"#2563eb",
textColor:"#ffffff"
},
textInput:{
placeholder:"Type your handbook question...",
sendButtonColor:"#2563eb"
}
}
}
});

/* mount chat */

const mount = document.getElementById("chatbot");
const chat = document.createElement("flowise-fullchatbot");
mount.appendChild(chat);

</script>

</body>
</html>
